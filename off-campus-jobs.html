<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Off Campus Jobs 2026 for Freshers | Software, Data Analyst Jobs India</title>

<meta name="description" content="Latest off campus jobs for freshers 2024, 2025, 2026 batch. Apply to software engineer, data analyst, and IT jobs across India from top companies like Microsoft, Google, EY.">
<meta name="keywords" content="off campus jobs 2026, fresher jobs India, software engineer jobs for freshers, data analyst jobs India, IT jobs for freshers, jobs for 2024 2025 2026 batch, entry level jobs India">
 <script type="application/ld+json">
{
 "@context": "https://schema.org",
 "@type": "WebSite",
 "name": "Off Camp",
 "url": "https://offcamp.online"
}
</script>   
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(180deg, #020617, #020617);
    color: white;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    padding: 18px 30px;
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    background: rgba(0,0,0,0.3);
}

nav h1 {
    font-size: 20px;
}

/* HERO */
.hero {
    text-align: center;
    padding: 60px 20px;
}

.hero h1 {
    font-size: 36px;
    margin-bottom: 10px;
}

.hero p {
    color: #cbd5f5;
}

/* SEARCH */
.search-box {
    display: flex;
    justify-content: center;
    margin-top: 20px;
}

.search-box input {
    width: 90%;
    max-width: 500px;
    padding: 14px;
    border-radius: 12px;
    border: none;
}

/* JOB GRID */
.job-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 25px;
    padding: 30px;
}

/* JOB CARD */
.job-card {
    background: linear-gradient(135deg, #7b5cff, #a855f7);
    border-radius: 18px;
    padding: 18px;
    transition: 0.3s;
    position: relative;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.job-card:hover {
    transform: translateY(-6px);
}

.job-header {
    display: flex;
    align-items: center;
    gap: 10px;
}

.job-header img {
    width: 45px;
    height: 45px;
    background: white;
    border-radius: 10px;
    padding: 5px;
}

.job-title {
    font-size: 15px;
    font-weight: 600;
}

.tags {
    margin-top: 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.tag {
    background: rgba(255,255,255,0.9);
    color: black;
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 10px;
}

.job-footer {
    margin-top: 12px;
    display: flex;
    justify-content: space-between;
    font-size: 13px;
}

.apply-btn {
    display: block;
    margin-top: 12px;
    text-align: center;
    background: white;
    color: black;
    padding: 10px;
    border-radius: 10px;
    font-weight: 600;
    text-decoration: none;
}

/* RESPONSIVE */
@media(max-width:600px) {
    .hero h1 {
        font-size: 26px;
    }
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<h1 style="display:flex;align-items:center;gap:10px;">
<img src="logo.png" style="height:32px;width:32px;border-radius:8px;">
Off Camp
</h1>
</nav>

<!-- HERO -->
<div class="hero">
</p>
    
<h2>Latest Off Campus Jobs for Freshers 2026</h2>

<p>
Find the latest off campus jobs for freshers in India including software engineer jobs, data analyst roles, internships, and entry level IT jobs. 
</p>

<div class="search-box">
<input type="text" id="search" placeholder="Search jobs, companies...">
</div>
</div>

<!-- JOB LIST -->
<div id="jobs" class="job-grid"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBRh1F8VBXApvMD_Es82_lW6-JYxbhAh50",
  authDomain: "off-camp-61317.firebaseapp.com",
  databaseURL: "https://off-camp-61317-default-rtdb.firebaseio.com",
  projectId: "off-camp-61317",
  storageBucket: "off-camp-61317.firebasestorage.app",
  messagingSenderId: "196425828236",
  appId: "1:196425828236:web:efc275143e7dbd673338a9",
  measurementId: "G-377FWQMFZR"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const container = document.getElementById("jobs");
const searchInput = document.getElementById("search");

let allJobs = [];

db.ref("mydatabases/btech/jobs").on("value", snapshot => {
    allJobs = [];
    snapshot.forEach(child => {
        allJobs.push(child.val());
    });
    renderJobs(allJobs);
});

function renderJobs(jobs) {
    container.innerHTML = "";

    jobs.forEach(job => {
        const card = `
        <div class="job-card">

            <div class="job-header">
                <img src="${job['Image URL'] || job['ImageURL'] || job.image || 'logo.png'}" 
     onerror="this.src='logo.png'" 
     alt="company logo">
                <div class="job-title">${job['Job Title']}</div>
            </div>

            <div class="tags">
                <span class="tag">📍 ${job.Location}</span>
                <span class="tag">🎯 ${job.Experience}</span>
            </div>

            <div class="job-footer">
                <span>💼 Fulltime</span>
                <span>💰 ${job.Salary}</span>
            </div>

            <a href="${job['Apply Link']}" target="_blank" class="apply-btn">
                Apply Now
            </a>

        </div>
        `;
        container.innerHTML += card;
    });
}

/* SEARCH */
searchInput.addEventListener("input", () => {
    const value = searchInput.value.toLowerCase();

    const filtered = allJobs.filter(job =>
        job['Job Title'].toLowerCase().includes(value) ||
        job['Company Name'].toLowerCase().includes(value)
    );

    renderJobs(filtered);
});
</script>

</body>
</html>
