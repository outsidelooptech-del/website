<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Remote Internships 2026 | Work From Home Internships for Students & Freshers | Off Camp</title>

<meta name="description" content="Latest remote internships for students and freshers. Explore paid internships, software internships, AI internships, and work from home internship opportunities from top companies worldwide.">

<meta name="keywords" content="remote internships, work from home internships, paid internships, software internship, AI internship, data analyst internship, engineering internships, internships for students">

<link rel="canonical" href="https://offcamp.online/remote-internships.html">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #020617;
    color: white;
}

nav {
    display: flex;
    justify-content: space-between;
    padding: 18px 30px;
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    background: rgba(0,0,0,0.3);
    z-index: 10;
}

.hero {
    text-align: center;
    padding: 60px 20px;
}

.hero h2 {
    font-size: 34px;
    margin-bottom: 10px;
}

.hero p {
    color: #cbd5f5;
}

.controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 20px;
}

.controls input,
.controls select {
    padding: 12px;
    border-radius: 10px;
    border: none;
    min-width: 180px;
}

.job-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 25px;
    padding: 30px;
}

.job-card {
    background: linear-gradient(135deg, #0ea5e9, #6366f1);
    border-radius: 18px;
    padding: 18px;
    transition: 0.3s;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.job-card:hover {
    transform: translateY(-6px);
}

.job-header {
    display: flex;
    align-items: center;
    gap: 10px;
}

.job-header img {
    width: 45px;
    height: 45px;
    background: white;
    border-radius: 10px;
    padding: 5px;
}

.job-title {
    font-size: 15px;
    font-weight: 600;
}

.tags {
    margin-top: 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.tag {
    background: rgba(255,255,255,0.9);
    color: black;
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 10px;
}

.job-footer {
    margin-top: 12px;
    display: flex;
    justify-content: space-between;
    font-size: 13px;
}

.apply-btn {
    display: block;
    margin-top: 12px;
    text-align: center;
    background: white;
    color: black;
    padding: 10px;
    border-radius: 10px;
    font-weight: 600;
    text-decoration: none;
}

.pagination {
    text-align: center;
    margin: 20px;
}

.pagination button {
    margin: 5px;
    padding: 8px 14px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
}

.loading {
    text-align: center;
    padding: 40px;
    font-size: 18px;
}

</style>

</head>

<body>

<nav>
<h1 style="display:flex;align-items:center;gap:10px;">
<img src="logo.png" style="height:32px;width:32px;border-radius:8px;">
Off Camp
</h1>
</nav>

<div class="hero">

<h2>Latest Remote Internships for Students & Freshers 2026</h2>

<p>
Explore verified remote internships from multiple global job boards. Find software internships, data analyst internships, AI internships, and paid internships for students and freshers updated daily.
</p>

<div class="controls">

<input
id="search"
type="text"
placeholder="Search internships or companies...">

<select id="sort">
<option value="new">Sort: Newest</option>
<option value="old">Sort: Oldest</option>
</select>

<select id="locationFilter">
<option value="all">All Locations</option>
<option value="Remote">Remote</option>
<option value="Worldwide">Worldwide</option>
</select>

</div>

</div>

<div id="jobs" class="job-grid"></div>

<div id="pagination" class="pagination"></div>

<script>

const container = document.getElementById("jobs");
const paginationContainer = document.getElementById("pagination");

const searchInput = document.getElementById("search");
const sortSelect = document.getElementById("sort");
const locationFilter = document.getElementById("locationFilter");

let allJobs = [];
let filteredJobs = [];

let currentPage = 1;
const jobsPerPage = 9;

const feeds = [
"https://remoteok.com/rss",
"https://weworkremotely.com/remote-jobs.rss",
"https://remotive.com/remote-jobs.rss"
];

function showLoading() {
container.innerHTML = "<div class='loading'>Loading internships...</div>";
}

async function fetchAllFeeds() {

showLoading();

try {

let jobs = [];

for (const feed of feeds) {

const response = await fetch(
`https://api.rss2json.com/v1/api.json?rss_url=${feed}`
);

const data = await response.json();

if (data.items) {

const mapped = data.items.map(item => ({

title: item.title || "Internship",
company: item.author || "Company",
location: item.categories?.join(", ") || "Remote",
link: item.link,
image: item.thumbnail || item.enclosure?.link || "logo.png",
date: new Date(item.pubDate)

}));

jobs = jobs.concat(mapped);

}

}

const uniqueJobs = [];
const links = new Set();

jobs.forEach(job => {

if (!links.has(job.link)) {
links.add(job.link);
uniqueJobs.push(job);
}

});

allJobs = uniqueJobs;

applyFilters();

}

catch (error) {

container.innerHTML = "Error loading internships";

console.log(error);

}

}

function applyFilters() {

const searchValue = searchInput.value.toLowerCase();
const locationValue = locationFilter.value;

filteredJobs = allJobs.filter(job => {

const matchesSearch =
job.title.toLowerCase().includes(searchValue) ||
job.company.toLowerCase().includes(searchValue);

const matchesLocation =
locationValue === "all" ||
job.location.includes(locationValue);

return matchesSearch && matchesLocation;

});

if (sortSelect.value === "new") {
filteredJobs.sort((a, b) => b.date - a.date);
} else {
filteredJobs.sort((a, b) => a.date - b.date);
}

currentPage = 1;

renderJobs();
createPagination();

}

function renderJobs() {

container.innerHTML = "";

const start = (currentPage - 1) * jobsPerPage;
const end = start + jobsPerPage;

const jobsToShow = filteredJobs.slice(start, end);

jobsToShow.forEach(job => {

const card = `

<div class="job-card">

<div class="job-header">

<img
src="${job.image}"
onerror="this.src='logo.png'">

<div class="job-title">
${job.title}
</div>

</div>

<div class="tags">

<span class="tag">
📍 ${job.location}
</span>

<span class="tag">
🏢 ${job.company}
</span>

</div>

<div class="job-footer">

<span>
💼 Internship
</span>

<span>
🌎 Remote
</span>

</div>

<a
href="${job.link}"
target="_blank"
class="apply-btn">
Apply Now
</a>

</div>

`;

container.innerHTML += card;

});

}

function createPagination() {

paginationContainer.innerHTML = "";

const pageCount =
Math.ceil(filteredJobs.length / jobsPerPage);

for (let i = 1; i <= pageCount; i++) {

const btn = document.createElement("button");

btn.innerText = i;

btn.onclick = () => {
currentPage = i;
renderJobs();
};

paginationContainer.appendChild(btn);

}

}

searchInput.addEventListener("input", applyFilters);

sortSelect.addEventListener("change", applyFilters);

locationFilter.addEventListener("change", applyFilters);

fetchAllFeeds();

// Auto refresh jobs every 10 minutes
setInterval(fetchAllFeeds, 10 * 60 * 1000);

</script>

</body>
</html>
