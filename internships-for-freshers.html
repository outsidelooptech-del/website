<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Remote Internships 2026 | Work From Home Internships for Students & Freshers</title>

<meta name="description" content="Find the latest remote internships for students and freshers in India. Apply to software, data analyst, marketing, AI, and paid internships from top companies. Updated daily.">

<meta name="keywords" content="
remote internships 2026,
work from home internships,
internships for students India,
paid internships India,
software engineer internship,
data analyst internship,
AI internship,
summer internships 2026,
internships for freshers,
online internships India,
engineering internships,
internship for 2024 2025 2026 batch,
internships with stipend,
remote internship opportunities,
virtual internships India
">

<link rel="canonical" href="https://offcamp.online/internships.html">

<script type="application/ld+json">
{
 "@context": "https://schema.org",
 "@type": "WebSite",
 "name": "Off Camp",
 "url": "https://offcamp.online"
}
</script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(180deg, #020617, #020617);
    color: white;
}

/* NAVBAR */

nav {
    display: flex;
    justify-content: space-between;
    padding: 18px 30px;
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    background: rgba(0,0,0,0.3);
}

nav h1 {
    font-size: 20px;
}

/* HERO */

.hero {
    text-align: center;
    padding: 60px 20px;
}

.hero h1 {
    font-size: 36px;
    margin-bottom: 10px;
}

.hero p {
    color: #cbd5f5;
}

/* SEARCH */

.search-box {
    display: flex;
    justify-content: center;
    margin-top: 20px;
}

.search-box input {
    width: 90%;
    max-width: 500px;
    padding: 14px;
    border-radius: 12px;
    border: none;
}

/* GRID */

.job-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 25px;
    padding: 30px;
}

/* CARD */

.job-card {
    background: linear-gradient(135deg, #0ea5e9, #6366f1);
    border-radius: 18px;
    padding: 18px;
    transition: 0.3s;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.job-card:hover {
    transform: translateY(-6px);
}

.job-header {
    display: flex;
    align-items: center;
    gap: 10px;
}

.job-header img {
    width: 45px;
    height: 45px;
    background: white;
    border-radius: 10px;
    padding: 5px;
}

.job-title {
    font-size: 15px;
    font-weight: 600;
}

.tags {
    margin-top: 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.tag {
    background: rgba(255,255,255,0.9);
    color: black;
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 10px;
}

.job-footer {
    margin-top: 12px;
    display: flex;
    justify-content: space-between;
    font-size: 13px;
}

.apply-btn {
    display: block;
    margin-top: 12px;
    text-align: center;
    background: white;
    color: black;
    padding: 10px;
    border-radius: 10px;
    font-weight: 600;
    text-decoration: none;
}

@media(max-width:600px) {
    .hero h1 {
        font-size: 26px;
    }
}

</style>
</head>

<body>

<!-- NAV -->

<nav>
<h1 style="display:flex;align-items:center;gap:10px;">
<img src="logo.png" style="height:32px;width:32px;border-radius:8px;">
Off Camp
</h1>
</nav>

<!-- HERO -->

<div class="hero">

<h2>Latest Remote Internships for Students & Freshers 2026</h2>

<p>

Explore verified remote internships, paid internships, and work from home internship opportunities from top companies in India.

</p>

<div class="search-box">
<input type="text" id="search" placeholder="Search internships, companies...">
</div>

</div>

<!-- INTERNSHIP LIST -->

<div id="jobs" class="job-grid"></div>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const container = document.getElementById("jobs");
const searchInput = document.getElementById("search");

let allJobs = [];
let currentPage = 1;

const jobsPerPage = 9;

function showLoading() {
    container.innerHTML =
    "<p style='text-align:center'>Loading internships...</p>";
}

async function fetchRemoteInternships() {

    showLoading();

    try {

        const response =
        await fetch(
        "https://api.rss2json.com/v1/api.json?rss_url=https://remoteok.com/rss"
        );

        const data = await response.json();

        allJobs = data.items.map(item => {

            return {

                title:
                item.title || "Internship",

                company:
                item.author || "Company",

                location:
                item.categories?.join(", ")
                || "Remote",

                stipend:
                "Paid",

                link:
                item.link,

                image:
                item.thumbnail
                || "logo.png"

            };

        });

        renderJobs();

        createPagination();

    }

    catch (error) {

        container.innerHTML =
        "<p>Error loading internships</p>";

        console.log(error);

    }

}

function renderJobs() {

    container.innerHTML = "";

    const start =
    (currentPage - 1) * jobsPerPage;

    const end =
    start + jobsPerPage;

    const jobsToShow =
    allJobs.slice(start, end);

    jobsToShow.forEach(job => {

        const card = `

        <div class="job-card">

            <div class="job-header">

                <img src="${job.image}"
                onerror="this.src='logo.png'">

                <div class="job-title">

                ${job.title}

                </div>

            </div>

            <div class="tags">

                <span class="tag">

                📍 ${job.location}

                </span>

                <span class="tag">

                🏢 ${job.company}

                </span>

            </div>

            <div class="job-footer">

                <span>

                💼 Internship

                </span>

                <span>

                💰 ${job.stipend}

                </span>

            </div>

            <a href="${job.link}"
            target="_blank"
            class="apply-btn">

            Apply Now

            </a>

        </div>

        `;

        container.innerHTML += card;

    });

}

function createPagination() {

    const pageCount =
    Math.ceil(allJobs.length / jobsPerPage);

    let paginationHTML =
    "<div style='text-align:center;margin:20px'>";

    for (let i = 1; i <= pageCount; i++) {

        paginationHTML +=

        `<button
        onclick="goToPage(${i})"
        style="
        margin:5px;
        padding:8px 12px;
        border-radius:8px;
        border:none;
        cursor:pointer;
        ">

        ${i}

        </button>`;

    }

    paginationHTML += "</div>";

    container.innerHTML += paginationHTML;

}

function goToPage(page) {

    currentPage = page;

    renderJobs();

    createPagination();

}

searchInput.addEventListener(
"input",
() => {

    const value =
    searchInput.value
    .toLowerCase();

    const filtered =
    allJobs.filter(job =>

        job.title
        .toLowerCase()
        .includes(value)

        ||

        job.company
        .toLowerCase()
        .includes(value)

    );

    allJobs = filtered;

    currentPage = 1;

    renderJobs();

    createPagination();

}

);

fetchRemoteInternships();

</script>

<!-- RSS FEED FOR REMOTE INTERNSHIPS -->

<link rel="alternate"
type="application/rss+xml"
title="Remote Internships RSS"
href="/rss/remote-internships.xml">

</body>
</html>
