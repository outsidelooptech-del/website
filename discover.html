<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hiring UI Clone</title>

<style>

/* BODY */
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f6f8;
}

/* NAVBAR */
.navbar {
    display: flex;
    align-items: center;
    padding: 12px 20px;
    background: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.logo {
    font-weight: bold;
    color: #ff4f8b;
}

.search {
    flex: 1;
    margin: 0 20px;
    padding: 10px;
    border-radius: 20px;
    border: 1px solid #ddd;
}

.signup {
    background: #ffcc00;
    border: none;
    padding: 8px 16px;
    border-radius: 20px;
}

/* ================= TOP SECTION ================= */

.top-section {
    background: white;
    padding: 10px 20px;
    border-bottom: 1px solid #eee;
}

/* FILTER ROW */
.filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
}

.filter-row button {
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid #ddd;
    background: white;
    font-size: 13px;
    cursor: pointer;
}

.divider {
    color: #aaa;
}

/* SHARE */
.share {
    background: linear-gradient(45deg, purple, pink);
    color: white;
}

.new {
    background: white;
    color: purple;
    font-size: 10px;
    padding: 2px 5px;
    border-radius: 6px;
}

/* CLEAR */
.clear {
    color: red;
    border: none;
}

/* BANNER */


/* CONTROLS */
.controls-bar {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
}

.controls-wrapper {
    display: flex;
    justify-content: space-between;
    align-items: center; /* IMPORTANT */
    margin-top: 10px;
}

/* LEFT SIDE */
.left-info {
    font-size: 14px;
    color: #555;
    margin-left: 10px;
}

/* RIGHT SIDE */
.right-side {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
}

/* BANNER */
.banner {
    font-size: 13px;
    margin-bottom: 5px;
}

.banner a {
    color: #ff4f8b;
    text-decoration: none;
}

/* CONTROLS */
.left-controls {
    display: flex;
    gap: 10px;
}

.left-controls select {
    padding: 5px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

.show-all {
    border: 1px solid #ddd;
    border-radius: 20px;
    padding: 6px 12px;
    background: white;
}


.right-info {
    color: #555;
}

/* ================= JOB CARDS ================= */

.container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 12px;
}

/* ================= POPUP ================= */

#popup {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    top: 0;
}

#panel {
    position: absolute;
    right: -400px;
    width: 350px;
    height: 100%;
    background: white;
    padding: 20px;
    transition: 0.3s;
}

#panel.active {
    right: 0;
}

.apply-btn {
    margin-top: 20px;
    width: 100%;
    padding: 10px;
    background: #ff4f8b;
    color: white;
    border: none;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">Off Camp</div>
    <input class="search" placeholder="Search jobs">
    <button class="signup">Sign up</button>
</div>

<!-- TOP SECTION -->
<div class="top-section">

    <div class="filter-row">
        <button onclick="openFilter('Departments')">Departments</button>
        <button onclick="openFilter('Salary')">Salary</button>
        <button onclick="openFilter('Commitment')">Commitment</button>
        <button onclick="openFilter('Experience')">Experience</button>
        <button onclick="openFilter('Job Titles')">Job Titles & Keywords</button>
        <button onclick="openFilter('Education')">Education</button>
        <button>Licenses</button>
        <button>Security</button>
        <button>Languages</button>
        <button>Shifts</button>
        <button>Travel</button>
        <button>Benefits</button>
        <button>Encouraged</button>

        <span class="divider">|</span>

        <button>Company</button>
        <button>Industry</button>
        <button>Stage</button>
        <button>Size</button>
        <button>Year</button>

        <button class="share">Share <span class="new">NEW</span></button>
        <button class="clear">Clear filters</button>
    </div>



    </div>
    
  <div class="controls-wrapper">

    <!-- LEFT -->
    <div class="left-info">
        116,217 jobs · 5,113 companies - India
    </div>

    <!-- RIGHT -->
    <div class="left-controls">
        <select><option>Relevance</option></select>
        <select><option>3 months</option></select>
        <select><option>Easy or lengthy apply</option></select>
        <button class="show-all">Show all jobs</button>
    </div>

</div>

</div>

<!-- JOBS -->
<div class="container">
    <div class="card">
        <h3>Software Engineer</h3>
        <p>Bangalore</p>
    </div>

    <div class="card">
        <h3>Data Analyst</h3>
        <p>Hyderabad</p>
    </div>
</div>

<!-- FILTER PANEL -->
<div id="popup" onclick="outsideClick(event)">
    <div id="panel">

        <div style="display:flex; justify-content:space-between;">
            <h3 id="title">Filter</h3>
            <span onclick="closePopup()">✖</span>
        </div>

        <div id="content"></div>

        <button class="apply-btn" onclick="closePopup()">Apply</button>

    </div>
</div>

<script>

function openFilter(type) {
    document.getElementById("popup").style.display = "block";
    setTimeout(() => document.getElementById("panel").classList.add("active"), 10);

    document.getElementById("title").innerText = type;

    let c = document.getElementById("content");

    if (type === "Departments") {
        c.innerHTML = `
            <label><input type="checkbox"> Engineering</label><br>
            <label><input type="checkbox"> Data</label>
        `;
    }

    else if (type === "Salary") {
        c.innerHTML = `
            <label><input type="radio"> 3-6 LPA</label><br>
            <label><input type="radio"> 6-10 LPA</label>
        `;
    }

    else if (type === "Experience") {
        c.innerHTML = `
            <label><input type="checkbox"> 0-1</label><br>
            <label><input type="checkbox"> 1-3</label>
        `;
    }

    else {
        c.innerHTML = `<p>No options yet</p>`;
    }
}

function closePopup() {
    document.getElementById("panel").classList.remove("active");
    setTimeout(() => document.getElementById("popup").style.display = "none", 300);
}

function outsideClick(e) {
    if (e.target.id === "popup") closePopup();
}

</script>

</body>
</html>
