<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Job Copilot | HiringCafe Style Jobs</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* TOP BAR */
.topbar {
  padding: 15px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
  background: #111827;
}

.topbar input {
  padding: 10px;
  border-radius: 8px;
  border: none;
  width: 200px;
}

/* FILTER ROW */
.filters {
  display: flex;
  gap: 10px;
  justify-content: center;
  padding: 10px;
  flex-wrap: wrap;
}

.filter-btn {
  background: #1f2937;
  padding: 8px 12px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 13px;
}

/* CARD */
.card {
  width: 350px;
  margin: 30px auto;
  background: #111827;
  padding: 20px;
  border-radius: 15px;
}

/* POPUP */
.popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
}

.popup-content {
  background: #1f2937;
  width: 300px;
  margin: 100px auto;
  padding: 20px;
  border-radius: 10px;
}

.popup button {
  margin-top: 10px;
  padding: 8px;
}
</style>
</head>

<body>

<!-- TOP SEARCH -->
<div class="topbar">
  <input id="search" placeholder="Search jobs..." />
  <input id="location" placeholder="Location (e.g. Bangalore)" />
  <button onclick="applyFilters()">Search</button>
</div>

<!-- FILTERS -->
<div class="filters">
  <div class="filter-btn" onclick="openPopup('salary')">Salary</div>
  <div class="filter-btn" onclick="openPopup('exp')">Experience</div>
  <div class="filter-btn" onclick="openPopup('commit')">Commitment</div>
  <div class="filter-btn" onclick="openPopup('edu')">Education</div>
  <div class="filter-btn" onclick="openPopup('lang')">Languages</div>
  <div class="filter-btn" onclick="resetFilters()">Reset</div>
</div>

<!-- JOB CARD -->
<div class="card" id="jobCard">Loading jobs...</div>

<!-- POPUPS -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h3 id="popupTitle"></h3>
    <input id="popupInput" placeholder="Enter value..." />
    <button onclick="saveFilter()">Apply</button>
    <button onclick="closePopup()">Close</button>
  </div>
</div>

<script>
let jobs = [];
let index = 0;
let filters = {};
let currentFilter = "";

const API = "https://job-backend-gori.onrender.com/jobs";

/* LOAD JOBS */
async function loadJobs() {
  const res = await fetch(API);
  jobs = await res.json();
  render();
}

/* RENDER */
function render() {
  if (!jobs.length) return;

  const job = jobs[index];

  document.getElementById("jobCard").innerHTML = `
    <h2>${job.title}</h2>
    <p>${job.company}</p>
    <p>${job.location}</p>
    <p>${job.work_mode} | ${job.job_type}</p>
    <p>${job.job_description}</p>
  `;
}

/* NEXT JOB */
function nextJob() {
  index++;
  if (index >= jobs.length) index = 0;
  render();
}

/* FILTER SYSTEM */
function applyFilters() {
  const keyword = document.getElementById("search").value;
  const location = document.getElementById("location").value;

  let url = `${API}/filter?`;

  if (keyword) url += `keyword=${keyword}&`;
  if (location) url += `location=${location}&`;

  fetch(url)
    .then(res => res.json())
    .then(data => {
      jobs = data;
      index = 0;
      render();
    });
}

/* POPUP */
function openPopup(type) {
  currentFilter = type;
  document.getElementById("popup").style.display = "block";
  document.getElementById("popupTitle").innerText = "Set " + type;
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}

function saveFilter() {
  const value = document.getElementById("popupInput").value;
  filters[currentFilter] = value;
  closePopup();
}

/* RESET */
function resetFilters() {
  filters = {};
  loadJobs();
}

/* INIT */
loadJobs();
</script>

</body>
</html>
